providers:
  - provider_id: openai_default
    provider_type: openai
    name: OpenAI Official
    access_mode: litellm
    enabled: true
    default_config:
      api_key_env: OPENAI_API_KEY
      base_url: https://api.openai.com/v1

  - provider_id: internal_gateway
    provider_type: gateway
    name: Internal Model Gateway
    access_mode: openai_gateway
    enabled: true
    default_config:
      api_key_env: INTERNAL_GATEWAY_API_KEY
      base_url: http://model-gateway.xxx/v1

  - provider_id: qwen_dashscope
    provider_type: qwen
    name: Alibaba DashScope
    access_mode: litellm
    enabled: true
    default_config:
      api_key_env: sk-0e9d5556c8034cd0b0d336371b4a853c
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
