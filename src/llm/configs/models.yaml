models:
  - model_id: gpt4o_chat
    model_name: GPT-4o Chat
    provider_id: openai_default
    access_mode: litellm
    capability: chat
    upstream_model_name: gpt-4o
    enabled: true
    is_default: true
    timeout: 30
    max_retries: 2
    meta:
      supports_vision: true

  - model_id: internal_text_embedding
    model_name: Internal Text Embedding
    provider_id: internal_gateway
    access_mode: openai_gateway
    capability: embedding
    upstream_model_name: text-embedding-3-large
    enabled: true
    is_default: true
    timeout: 20
    max_retries: 2
    meta: {}

  - model_id: qwen_plus_chat
    model_name: Qwen Plus Chat
    provider_id: qwen_dashscope
    access_mode: litellm
    capability: chat
    upstream_model_name: qwen-plus
    enabled: true
    is_default: false
    timeout: 30
    max_retries: 2
    meta: {}

  - model_id: qwen_text_embedding_v4
    model_name: Qwen Text Embedding V4
    provider_id: qwen_dashscope
    access_mode: litellm
    capability: embedding
    upstream_model_name: text-embedding-v4
    enabled: true
    is_default: false
    timeout: 30
    max_retries: 2
    meta: {}
