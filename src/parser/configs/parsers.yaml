parsers:
  - parser_id: docling_native_parser
    parser_name: Docling Native Parser
    provider_id: docling_native_provider
    access_mode: native_sdk
    capability: document_parse
    enabled: true
    is_default: true
    timeout: 60
    max_retries: 2
    meta:
      supported_extensions:
        - pdf
        - docx
        - pptx
        - html

  - parser_id: docling_loader_parser
    parser_name: Docling Loader Parser
    provider_id: docling_loader_provider
    access_mode: langchain_loader
    capability: document_parse
    enabled: true
    is_default: false
    timeout: 60
    max_retries: 2
    meta:
      export_type: doc_chunks

  - parser_id: ppocr_pdf_ocr_parser
    parser_name: PPOCR PDF OCR Parser
    provider_id: ppocr_pdf_ocr_service_provider
    access_mode: custom_service
    capability: document_parse
    enabled: true
    is_default: false
    timeout: 60
    max_retries: 2
    meta:
      parser_type: pdf_ocr
      supported_extensions:
        - pdf
      supported_mime_types:
        - application/pdf
      description: OCR-only parser for scanned PDF documents
