providers:
  - provider_id: docling_native_provider
    provider_type: docling
    name: Docling Native Provider
    access_mode: native_sdk
    enabled: true
    default_config:
      enable_ocr: false
      keep_page_meta: true

  - provider_id: docling_loader_provider
    provider_type: docling
    name: Docling Loader Provider
    access_mode: langchain_loader
    enabled: true
    default_config:
      export_type: doc_chunks
      keep_page_meta: true

  - provider_id: ppocr_pdf_ocr_service_provider
    provider_type: ppocr
    name: PPOCR PDF OCR Service Provider
    access_mode: custom_service
    enabled: true
    default_config:
      endpoint: https://prod-ocr.hysz.co:9443/ocr
      timeout_seconds: 60
      visualize: false
      use_textline_orientation: false
      use_doc_unwarping: false
      use_doc_orientation_classify: false
      parser_scope: pdf_ocr
